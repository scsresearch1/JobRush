# Render blueprint for JobRush API
# Deploy: Connect repo → Render reads this automatically
services:
  - type: web
    name: jobrush-api
    env: node
    buildCommand: npm install && cd server && npm install
    startCommand: node server/index.js
    envVars:
      - key: GROQ_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: NODE_ENV
        value: production
