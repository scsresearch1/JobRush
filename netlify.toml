# Netlify config for JobRush.ai frontend
[build]
  command = "npm run build"
  publish = "dist"

# Proxy API to Render (same-origin, avoids CORS). Must come before SPA catch-alls.
[[redirects]]
  from = "/api/*"
  to = "https://jobrush.onrender.com/api/:splat"
  status = 200
  force = true

# Admin portal (jadm) at /jadm — must be before main SPA catch-all.
[[redirects]]
  from = "/jadm"
  to = "/jadm/"
  status = 301

[[redirects]]
  from = "/jadm/*"
  to = "/jadm/index.html"
  status = 200

# Main app SPA: serve index.html for all other routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
