# Netlify config for JobRush frontend
[build]
  command = "npm run build"
  publish = "dist"

# Proxy API to Render (same-origin, avoids CORS). Must come before SPA catch-all.
[[redirects]]
  from = "/api/*"
  to = "https://jobrush.onrender.com/api/:splat"
  status = 200
  force = true

# SPA: serve index.html for all routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
